name: check

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install
        run: make install

      - name: Run linter
        run: make lint

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@5ffbad44543237d1b339a5ed57a774432e19f3e4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
